<div class="login-page">
      <!-- Background decoration -->
      <div class="bg-grid"></div>
      <div class="bg-glow"></div>

      <div class="login-container">
        <!-- Brand -->
        <div class="brand">
          <div class="brand-icon">
            <span class="material-icons">code</span>
          </div>
          <h1>Emmet<span class="text-orange">Academy</span></h1>
          <p>Online Tech  — Admin Portal</p>
        </div>

        <!-- Card -->
        <div class="login-card card">
          <h2>Sign In</h2>
          <p class="subtitle text-dim">Enter your credentials to continue</p>

          <div class="demo-accounts">
            <span class="demo-label">Demo Accounts:</span>
            <button class="demo-btn" (click)="fillDemo('admin')">Admin</button>
            <button class="demo-btn" (click)="fillDemo('staff')">Staff</button>
            <button class="demo-btn" (click)="fillDemo('student')">Student</button>
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
            <div class="form-group">
              <label>Email Address</label>
              <input class="form-control" type="email" formControlName="email" placeholder="you@emmetacademy.in">
            </div>

            <div class="form-group">
              <label>Password</label>
              <div style="position:relative">
                <input class="form-control" [type]="showPwd() ? 'text' : 'password'" formControlName="password" placeholder="••••••••">
                <button class="pwd-toggle" type="button" (click)="showPwd.set(!showPwd())">
                  <span class="material-icons">{{ showPwd() ? 'visibility_off' : 'visibility' }}</span>
                </button>
              </div>
            </div>

            @if (error()) {
              <div class="error-msg">
                <span class="material-icons">error_outline</span> {{ error() }}
              </div>
            }

            <button class="btn btn-primary w-full" type="submit" [disabled]="loading()">
              @if (loading()) { <span class="spinner"></span> Signing in… }
              @else { <span class="material-icons">login</span> Sign In }
            </button>
          </form>
        </div>

        <p class="footer-note text-dim">© 2025 EmmetAcademy  — Pimpri, Maharashtra</p>
      </div>
    </div>
